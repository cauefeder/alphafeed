name: Refresh Reports

on:
  schedule:
    # Run daily at 08:00 UTC and 20:00 UTC
    - cron: "0 8 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # required to push updated report JSONs back to the repo

jobs:
  refresh:
    name: Regenerate report JSONs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout quant-scheduler (PolyTraders source)
        uses: actions/checkout@v4
        with:
          repository: cauefeder/quant-scheduler
          path: quant-scheduler

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run poly2_export (Polymarket macro)
        run: python backend/adapters/poly2_export.py
        timeout-minutes: 5
        env:
          POLY2_PAGES: "8"

      - name: Run polytraders_export (Kelly signals)
        run: python backend/adapters/polytraders_export.py
        timeout-minutes: 5
        env:
          POLYTRADERS_TOP_N: "25"
          POLYTRADERS_BANKROLL: "100"
          POLYTRADERS_TIME_PERIOD: "WEEK"
          POLYTRADERS_DIR: ${{ github.workspace }}/quant-scheduler/PolyTraders

      - name: Run quant_report (scored opportunities)
        run: python backend/adapters/quant_report.py
        timeout-minutes: 8
        env:
          POLYTRADERS_BANKROLL: "100"

      - name: Commit and push updated reports
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          git add -f reports/poly2.json reports/polytraders.json reports/quant_report.json 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: refresh reports $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin master

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="refresh-reports FAILED%0A$(date -u +'%Y-%m-%d %H:%M UTC')%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" || true
